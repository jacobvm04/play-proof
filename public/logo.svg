<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#C9F03C" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#C9F03C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9F03C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9F03C"/>
      <stop offset="100%" stop-color="#C9F03C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- deck panel -->
  <rect width="512" height="512" rx="64" fill="#0B0E0C"/>
  <rect x="8" y="8" width="496" height="496" rx="58" fill="url(#glow)"/>
  <rect x="20.5" y="20.5" width="471" height="471" rx="48" stroke="#2C332A" stroke-width="3"/>

  <!-- top seam: stamp + rec dot -->
  <circle cx="120" cy="118" r="13" fill="#FF3B30"/>
  <text x="150" y="127" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="30" letter-spacing="6" fill="#7E887A">REC</text>

  <!-- the mark -->
  <g transform="translate(256 268)" text-anchor="middle">
    <text font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="190" font-weight="700" fill="#C9F03C" y="0">▰</text>
  </g>

  <!-- wordmark -->
  <text x="256" y="372" text-anchor="middle" font-family="ui-sans-serif, 'Space Grotesk', system-ui, sans-serif" font-size="62" font-weight="700" letter-spacing="2" fill="#E9E7DD">Play<tspan fill="#C9F03C">Proof</tspan></text>

  <!-- transport rail -->
  <rect x="120" y="408" width="272" height="6" rx="3" fill="#12150F" stroke="#2C332A" stroke-width="1.5"/>
  <rect x="120" y="408" width="170" height="6" rx="3" fill="url(#rail)"/>
  <rect x="288" y="404.5" width="3.5" height="13" rx="1.5" fill="#C9F03C"/>
</svg>
